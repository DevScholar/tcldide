<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tk Hello - EmX11</title>
  </head>
  <body>
    <script type="module">
      import { loadTcldide } from '../../src/tcldide.js';

      const tcldide = await loadTcldide({ tk: true });

      await tcldide.runTclAsync(`
        label .title -text {Tk on WebAssembly} -font {Helvetica 14 bold} -pady 6
        pack  .title -fill x
        frame .sep -height 2 -relief sunken -bd 1
        pack  .sep  -fill x -padx 8 -pady 2

        frame .row1
        label  .row1.l -text {Names:} -width 8 -anchor ne
        text   .row1.e -width 24 -height 4
        button .row1.b -text {Greet} -command {
            set raw [string trim [.row1.e get 1.0 end]]
            if {$raw eq {}} {
                .out configure -text {Hello, World!}
            } else {
                set names {}
                foreach line [split $raw "\n"] {
                    set line [string trim $line]
                    if {$line ne {}} { lappend names $line }
                }
                .out configure -text "Hello, [join $names {, }]!"
            }
        }
        .row1.e insert end "One\nTwo\nThree"
        pack .row1.l .row1.e .row1.b -side left -padx 4 -pady 6
        pack .row1

        frame .row2
        label  .row2.cl  -text {Clicks:} -width 8 -anchor e
        label  .row2.cv  -textvariable ::clicks -width 4 -relief sunken -anchor e
        button .row2.inc -text { + } -command {incr ::clicks}
        button .row2.dec -text { - } -command {if {$::clicks > 0} {incr ::clicks -1}}
        button .row2.rst -text {Reset} -command {set ::clicks 0}
        pack .row2.cl .row2.cv .row2.inc .row2.dec .row2.rst -side left -padx 4 -pady 6
        pack .row2

        label .out -text {(press Greet)} -relief groove -bd 2 -padx 8 -pady 4 -width 32 -wraplength 240 -justify left
        pack  .out -padx 12 -pady 8

        set ::clicks 0
      `);

      console.log(`tk-hello: Tcl ${tcldide.version} / Tk ${tcldide.tkVersion} ready`);

      window.tcldide = tcldide;
    </script>
  </body>
</html>
