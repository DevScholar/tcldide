<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>tcldide · addition (Tcl-only)</title>
    <style>
      html, body { margin: 0; min-height: 100%; font-family: system-ui, sans-serif; }
      body { display: flex; align-items: center; justify-content: center; padding: 2rem; background: #f5f5f5; }
      main { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,.12); min-width: 320px; }
      h1 { margin: 0 0 .5rem; font-size: 1.25rem; }
      .sub { color: #666; font-size: .85rem; margin-bottom: 1rem; }
      .result { background: #f0f8ff; border: 1px solid #b8d4f0; border-radius: 4px; padding: .75rem; margin: .5rem 0; font-family: monospace; white-space: pre-wrap; }
      .ok { color: #0a6e0a; }
      .err { color: #c00; }
    </style>
  </head>
  <body>
    <main>
      <h1>tcldide · addition</h1>
      <p class="sub">Tcl-only wasm — no Tk, no em-x11. sync runTcl test.</p>
      <div id="status">Loading...</div>
      <div id="output" class="result" hidden></div>
    </main>
    <script type="module">
      import { loadTcldide } from '../../src/tcldide.js';

      const el = (id) => document.getElementById(id);

      const tcldide = await loadTcldide();

      el('status').innerHTML =
        `<span class="ok">Tcl ${tcldide.version} ready.</span> ` +
        `tkVersion=${tcldide.tkVersion ?? 'undefined'}, ` +
        `em=${tcldide.em ? 'PRESENT' : 'undefined'}.`;

      const div = el('output');
      div.hidden = false;

      const lines = [];

      // ---- sync runTcl ----

      try {
        const r = tcldide.runTcl('expr 1 + 1');
        lines.push(`<span class="ok">runTcl('expr 1 + 1')</span> → "${r}"`);
      } catch (e) {
        lines.push(`<span class="err">runTcl('expr 1 + 1') FAILED:</span> ${String(e)}`);
      }

      // ---- sync: multi-statement ----

      try {
        const r = tcldide.runTcl('set a 40; set b 2; expr {$a + $b}');
        lines.push(`<span class="ok">runTcl('set a 40; set b 2; expr {$a + $b}')</span> → "${r}"`);
      } catch (e) {
        lines.push(`<span class="err">runTcl multi-stmt FAILED:</span> ${String(e)}`);
      }

      // ---- async runTclAsync ----

      try {
        await tcldide.runTclAsync('set x 7; set y 8');
        const r = await tcldide.runTclAsync('expr {$x * $y}');
        lines.push(`<span class="ok">runTclAsync('expr {$x * $y}')</span> → "${r}"`);
      } catch (e) {
        lines.push(`<span class="err">runTclAsync FAILED:</span> ${String(e)}`);
      }

      div.innerHTML = lines.join('\n');

      console.log('addition: Tcl', await tcldide.globals.get('tcl_version'));
      console.log('em-x11 loaded:', tcldide.em ? 'YES' : 'NO');
    </script>
  </body>
</html>
