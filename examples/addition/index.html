<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Addition - Tcldide</title>
  </head>
  <body>
    <main>
      <h1>Addition - Tcldide</h1>
      <p>Tcl-only wasm, no Tk.</p>

      <div id="status">Loading...</div>

      <section id="results" hidden>
        <div>
          runTcl('expr 1 + 1')
          → "<span id="r1"></span>"
        </div>

        <div>
          runTcl('set a 40; set b 2; expr {$a + $b}')
          → "<span id="r2"></span>"
        </div>

        <div>
          runTclAsync('expr {$x * $y}')
          → "<span id="r3"></span>"
        </div>
      </section>
    </main>

    <script type="module">
      import { loadTcldide } from '../../src/tcldide';

      const tcldide = await loadTcldide();

      document.getElementById('status').textContent =
        `Tcl ${tcldide.version} loading complete.`;

      document.getElementById('results').hidden = false;

      // sync runTcl
      try {
        document.getElementById('r1').textContent = tcldide.runTcl('expr 1 + 1');
      } catch (e) {
        document.getElementById('r1').textContent = String(e);
      }

      // sync multi-statement
      try {
        document.getElementById('r2').textContent = tcldide.runTcl('set a 40; set b 2; expr {$a + $b}');
      } catch (e) {
        document.getElementById('r2').textContent = String(e);
      }

      // async runTclAsync
      try {
        await tcldide.runTclAsync('set x 7; set y 8');
        document.getElementById('r3').textContent = await tcldide.runTclAsync('expr {$x * $y}');
      } catch (e) {
        document.getElementById('r3').textContent = String(e);
      }

      console.log('addition: Tcl', tcldide.globals.get('tcl_version'));
      console.log('em-x11 loaded:', tcldide.em ? 'YES' : 'NO');
    </script>
  </body>
</html>
